<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<!-- Font Awesome for Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#FFFDE7;
}

.card{
    width:90%;
    max-width:320px;
    height: 85vh;
    background: #FCE4EC;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

/* Cover Image */
.cover{
    width:100%;
    height:35%;
    background:url('cover.jpg') center/cover;
}

/* Profile Image */
.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid #fff;
    margin-top:-60px;
    object-fit:cover;
}

/* Text */
.content{
    padding:20px;
}

.content h1{
    margin:10px 0;
}

.content p{
    color:gray;
    margin:5px 0;
}

/* Social Icons */
.social{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:20px;
}

.social a{
    font-size:24px;
    color:#E8F5E9;
    width:45px;
    height:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    text-decoration:none;
    transform:scale(1.2);
    transition:0.3s;
}

/* Colors */
.fb{ background:#1877f2; }
.insta{ background:#e1306c; }
.tiktok{ background:#000; }
.telegram{ background:#0088cc; }

</style>
</head>

<body>

<div class="card">

    <div class="cover"></div>

    <img src="profile.jpg" class="profile">

    <div class="content">
        <h1>WELCOME</h1>
       <b> Hey, I'm Srabontika 💖 <br> 
Living a soft & simple life 🌸  <br>
Music is my escape 🎧  <br>
Lost in my own little world 🌙  <br>
Not perfect, just real 💫  <br>
Stay kind, stay pure 🤍</b>

        <div class="social">
            <a href="https://www.facebook.com/SrabontikaIslam143" class="fb"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/srabontikaislam143?igsh=Y2twem5udTk0NTVh" class="insta"><i class="fab fa-instagram"></i></a>
            <a href="https://tiktok.com/@srabu1m" class="tiktok"><i class="fab fa-tiktok"></i></a>
            <a href="https://t.me/ALICESRABONTIKA" class="telegram"><i class="fab fa-telegram-plane"></i></a>
        </div>

    </div>

</div>

</body>
</html>
